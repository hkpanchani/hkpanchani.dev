<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <defs>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Subtle infinity loop behind the HP mark -->
  <path d="M6,20 C6,13 12,10 17,15 C20,18 22,18 25,15 C30,10 36,13 36,20
           C36,27 30,30 25,25 C22,22 20,22 17,25 C12,30 6,27 6,20 Z"
        stroke="url(#ng)" stroke-width="0.8" fill="none" opacity="0.12"/>

  <!-- H as circuit trace -->
  <line x1="10" y1="8" x2="10" y2="32" stroke="url(#ng)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="24" y2="32" stroke="url(#ng)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M10,19 L14,19 L14,17.5 L20,17.5 L20,19 L24,19" stroke="url(#ng)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- H pads -->
  <circle cx="10" cy="8" r="3.5" fill="#0a0a0f" stroke="url(#ng)" stroke-width="2"/>
  <circle cx="10" cy="32" r="3.5" fill="#0a0a0f" stroke="url(#ng)" stroke-width="2"/>
  <circle cx="24" cy="8" r="3.5" fill="#0a0a0f" stroke="url(#ng)" stroke-width="2"/>
  <circle cx="24" cy="32" r="3.5" fill="#0a0a0f" stroke="url(#ng)" stroke-width="2"/>
  <circle cx="10" cy="19" r="3" fill="url(#ng)"/>
  <circle cx="24" cy="19" r="3" fill="url(#ng)"/>

  <!-- Dashed bridge -->
  <line x1="24" y1="8" x2="31" y2="8" stroke="url(#ng)" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.35"/>

  <!-- P as circuit trace -->
  <line x1="31" y1="8" x2="31" y2="32" stroke="url(#ng)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M31,10 L36,10 C46,10 47,17 45,21 C43,25 38,26 34,26 L31,26" stroke="url(#ng)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="31" cy="8" r="3.5" fill="#0a0a0f" stroke="url(#ng)" stroke-width="2"/>
  <circle cx="31" cy="32" r="3.5" fill="#0a0a0f" stroke="url(#ng)" stroke-width="2"/>
  <circle cx="31" cy="26" r="3" fill="url(#ng)"/>
  <circle cx="46" cy="15" r="2.5" fill="url(#ng)"/>

  <!-- Tiny server rack accent (right of P) -->
  <g opacity="0.3" transform="translate(51,14)">
    <rect x="0" y="0" width="7" height="3" rx="0.5" fill="url(#ng)" opacity="0.6"/>
    <circle cx="1.5" cy="1.5" r="0.8" fill="#22c55e" opacity="0.8"/>
    <rect x="0" y="4" width="7" height="3" rx="0.5" fill="url(#ng)" opacity="0.5"/>
    <circle cx="1.5" cy="5.5" r="0.8" fill="#22c55e" opacity="0.7"/>
    <rect x="0" y="8" width="7" height="3" rx="0.5" fill="url(#ng)" opacity="0.4"/>
    <circle cx="1.5" cy="9.5" r="0.8" fill="#eab308" opacity="0.6"/>
  </g>

  <!-- Pulse on junction -->
  <circle cx="10" cy="19" r="3" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0">
    <animate attributeName="r" values="3;10;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Separator -->
  <line x1="64" y1="10" x2="64" y2="30" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Text -->
  <text x="71" y="17" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" font-weight="700" fill="#e8e8ed" letter-spacing="0.5">hkpanchani</text>
  <text x="71" y="30" font-family="'JetBrains Mono','Fira Code',monospace" font-size="10" font-weight="500" fill="#5a5a6e" letter-spacing="0.5">.dev</text>
</svg>
